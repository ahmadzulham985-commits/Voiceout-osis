<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceOut - Kotak Saran Modern</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-light: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --bg-dark: #0f172a;
      --card-light: rgba(255,255,255,0.8);
      --card-dark: rgba(30,41,59,0.7);
      --text-light: #1e293b;
      --text-dark: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    body.light { background: var(--bg-light); color: var(--text-light); }
    body.dark  { background: var(--bg-dark);  color: var(--text-dark);  }

    .container { width: 100%; max-width: 700px; animation: slideUp 0.8s ease-out; }

    .glass-card {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background-color: var(--card-light);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.125);
      padding: 30px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    body.dark .glass-card {
      background-color: var(--card-dark);
      border: 1px solid rgba(255,255,255,0.05);
    }

    h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; font-size: 2rem; }

    .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }

    .theme-btn {
      background: rgba(99,102,241,0.1);
      border: none; padding: 10px 18px;
      border-radius: 12px; cursor: pointer;
      font-weight: 600; color: var(--primary); transition: 0.3s;
    }
    .theme-btn:hover { background: var(--primary); color: white; }

    .input-group { position: relative; margin-bottom: 15px; }

    textarea {
      width: 100%; min-height: 140px; padding: 18px;
      border-radius: 16px; border: 2px solid transparent;
      background: rgba(0,0,0,0.05); color: inherit;
      font-family: inherit; font-size: 1rem; resize: none; transition: 0.3s;
    }
    body.dark textarea { background: rgba(255,255,255,0.05); }
    textarea:focus {
      outline: none; border-color: var(--primary);
      background: transparent; box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
    }

    .char-count { position: absolute; bottom: 12px; right: 12px; font-size: 12px; opacity: 0.6; }

    /* === AREA UPLOAD FOTO === */
    .upload-area {
      border: 2px dashed rgba(99,102,241,0.4);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 15px;
      position: relative;
    }
    .upload-area:hover { border-color: var(--primary); background: rgba(99,102,241,0.05); }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-label { font-size: 0.9rem; opacity: 0.7; pointer-events: none; line-height: 1.7; }
    .upload-label span { color: var(--primary); font-weight: 600; }

    #preview-wrap { display: none; position: relative; margin-bottom: 15px; }
    #img-preview {
      width: 100%; max-height: 220px; object-fit: cover;
      border-radius: 12px; display: block;
    }
    #remove-img {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.6); color: white;
      border: none; border-radius: 8px;
      padding: 4px 10px; cursor: pointer; font-size: 0.8rem;
    }
    .img-info { font-size: 0.75rem; opacity: 0.55; margin-top: 5px; text-align: right; }

    .btn-submit {
      background: var(--primary); color: white; border: none;
      padding: 14px; border-radius: 14px; width: 100%;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px var(--primary); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .stats-grid { display: grid; gap: 15px; margin: 20px 0; }
    .stat-card { background: rgba(99,102,241,0.05); padding: 15px; border-radius: 16px; text-align: center; }
    .stat-card span { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

    .post {
      background: var(--card-light); border-radius: 20px;
      padding: 20px; margin-bottom: 20px;
      animation: fadeIn 0.5s ease-out both;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    body.dark .post { background: var(--card-dark); }

    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 0.85rem; }
    .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    .post-content { line-height: 1.6; margin-bottom: 15px; }

    .post-img {
      width: 100%; max-height: 350px; object-fit: cover;
      border-radius: 12px; margin-bottom: 15px; display: block;
    }

    .like-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,0.1); padding: 8px 16px;
      border-radius: 100px; cursor: pointer; transition: 0.2s;
      font-size: 0.9rem; border: none; color: inherit;
    }
    .like-btn:hover { background: rgba(99,102,241,0.2); transform: scale(1.05); }

    .comment-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
    .comment-item {
      font-size: 0.85rem; padding: 8px 12px;
      background: rgba(0,0,0,0.03); border-radius: 10px; margin-bottom: 5px;
    }
    body.dark .comment-item { background: rgba(255,255,255,0.05); }
    .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input {
      flex: 1; padding: 8px 15px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1); background: transparent;
      color: inherit; font-family: inherit; font-size: 0.85rem;
    }
    .btn-reply {
      padding: 0 15px; border-radius: 10px; border: none;
      background: var(--primary); color: white;
      font-weight: 600; cursor: pointer; font-size: 0.8rem;
    }

    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: #1e293b; color: white;
      padding: 12px 24px; border-radius: 12px;
      display: none; z-index: 100; font-size: 0.9rem;
      white-space: nowrap;
    }

    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center;
      justify-content: center; z-index: 200;
      flex-direction: column; gap: 14px;
    }
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-overlay p { color: #fff; font-size: 0.9rem; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="light">

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">Memproses...</p>
</div>

<div class="container">
  <div class="glass-card">
    <div class="header-action">
      <h1>VoiceOut OSIS</h1>
      <button class="theme-btn" onclick="toggleMode()" id="themeText">🌙 Dark Mode</button>
    </div>

    <div class="input-group">
      <textarea id="message" maxlength="300"
        placeholder="Apa pendapat atau keluhanmu untuk sekolah?"
        oninput="updateCounter()"></textarea>
      <div class="char-count"><span id="chars">0</span>/300</div>
    </div>

    <!-- Preview gambar sebelum kirim -->
    <div id="preview-wrap">
      <img id="img-preview" src="" alt="Preview foto">
      <button id="remove-img" onclick="removeImage()">✕ Hapus</button>
      <p class="img-info" id="img-info"></p>
    </div>

    <!-- Tombol upload / drag-drop -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
      <div class="upload-label">
        📷 <span>Pilih foto</span> atau seret ke sini<br>
        <small style="opacity:0.5">JPG / PNG / WEBP · maks. 5 MB</small>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitPost()">Kirim Saran</button>
  </div>

  <div class="glass-card">
    <h3>📊 Trend Saran</h3>
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
      <div class="stat-card"><span id="total">0</span><p>Total</p></div>
      <div class="stat-card"><span id="today">0</span><p>Hari Ini</p></div>
      <div class="stat-card"><span id="month">0</span><p>Bulan Ini</p></div>
      <div class="stat-card"><span id="year">0</span><p>Tahun Ini</p></div>
    </div>
    <canvas id="chart" height="120"></canvas>
  </div>

  <div id="posts"></div>
</div>

<div id="toast"></div>

<!-- ===================== FIREBASE + LOGIKA ===================== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc,
  updateDoc, onSnapshot, arrayUnion,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ── CONFIG ────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyDWwSToHIICBOxpw39z5eVGpvx1x0wBXRM",
  authDomain:        "osis-kotak-saran.firebaseapp.com",
  projectId:         "osis-kotak-saran",
  storageBucket:     "osis-kotak-saran.firebasestorage.app",
  messagingSenderId: "756569969598",
  appId:             "1:756569969598:web:c58020f710028ce892dfef"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ── STATE ─────────────────────────────────────────────────── */
window._posts    = [];
window._postsMap = {};
let _base64Img   = null;   // hasil kompresi, siap kirim ke Firestore

/* ── FILTER KATA KASAR ─────────────────────────────────────── */
const badWords = ['anjing','babi','kontol','bangsat','memek','anj','kntl','asu','ajg'];
function filterText(text) {
  badWords.forEach(w => {
    text = text.replace(new RegExp(`\\b${w}\\b`, 'gi'), '****');
  });
  return text;
}

/* ── TOAST ─────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

/* ── LOADING ────────────────────────────────────────────────── */
function setLoading(on, msg = 'Memproses...') {
  document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
  document.getElementById('loading-msg').innerText = msg;
  document.getElementById('submitBtn').disabled = on;
}

/* ── KOMPRESI GAMBAR ────────────────────────────────────────── */
// Mengubah File → base64 JPEG yang sudah dikecilkan
// agar ukurannya muat dalam dokumen Firestore (< 1 MB)
function compressImage(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) {
      return reject(new Error('File harus berupa gambar.'));
    }

    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Gagal membaca file.'));
    reader.onload  = (ev) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Gambar tidak bisa dimuat.'));
      img.onload  = () => {
        // Target lebar maks 900 px
        const MAX_W = 900;
        let { width, height } = img;
        if (width > MAX_W) {
          height = Math.round(height * MAX_W / width);
          width  = MAX_W;
        }

        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);

        // Coba quality 0.72 dulu
        let b64 = canvas.toDataURL('image/jpeg', 0.72);
        // Jika masih > 700 KB encoded, kompresi lebih keras
        if (b64.length > 950000) {
          b64 = canvas.toDataURL('image/jpeg', 0.45);
        }
        // Jika masih > 900 KB, perkecil lagi dimensinya
        if (b64.length > 1200000) {
          canvas.width  = Math.round(width  * 0.65);
          canvas.height = Math.round(height * 0.65);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          b64 = canvas.toDataURL('image/jpeg', 0.5);
        }

        resolve(b64);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── PREVIEW GAMBAR ─────────────────────────────────────────── */
window.previewImage = async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    showToast('Ukuran foto maksimal 5 MB ya!');
    event.target.value = '';
    return;
  }

  setLoading(true, 'Mengompresi gambar...');
  try {
    const compressed = await compressImage(file);
    _base64Img = compressed;

    const sizeKB = Math.round(compressed.length * 0.75 / 1024);

    document.getElementById('img-preview').src        = compressed;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('uploadArea').style.display   = 'none';
    document.getElementById('img-info').innerText =
      `Ukuran terkompresi: ~${sizeKB} KB`;
  } catch (err) {
    showToast('Gagal memuat gambar: ' + err.message);
    _base64Img = null;
  } finally {
    setLoading(false);
  }
};

window.removeImage = () => {
  _base64Img = null;
  document.getElementById('imageInput').value           = '';
  document.getElementById('preview-wrap').style.display  = 'none';
  document.getElementById('uploadArea').style.display    = '';
};

/* ── SUBMIT POST ─────────────────────────────────────────────── */
window.submitPost = async () => {
  const textInput = document.getElementById('message');
  let text = textInput.value.trim();

  if (!text) return showToast('Tuliskan sesuatu dulu ya!');
  text = filterText(text);

  setLoading(true, 'Mengirim saran...');
  try {
    await addDoc(collection(db, 'posts'), {
      text,
      image:    _base64Img || null,   // string base64 atau null
      likes:    0,
      comments: [],
      date:     serverTimestamp()
    });

    textInput.value = '';
    removeImage();
    updateCounter();
    showToast('Saran terkirim anonim! 🎉');
  } catch (err) {
    console.error(err);
    showToast('Gagal mengirim: ' + err.message);
  } finally {
    setLoading(false);
  }
};

/* ── LIKE ────────────────────────────────────────────────────── */
window.likePost = async (id) => {
  try {
    await updateDoc(doc(db, 'posts', id), {
      likes: (window._postsMap[id]?.likes || 0) + 1
    });
  } catch (err) {
    console.error(err);
    showToast('Gagal memberi like.');
  }
};

/* ── KOMENTAR ────────────────────────────────────────────────── */
window.addComment = async (id) => {
  const input = document.getElementById(`in-comment-${id}`);
  const txt   = input.value.trim();
  if (!txt) return;
  try {
    await updateDoc(doc(db, 'posts', id), {
      comments: arrayUnion({ text: filterText(txt), date: new Date().toISOString() })
    });
    input.value = '';
  } catch (err) {
    console.error(err);
    showToast('Gagal kirim komentar.');
  }
};

/* ── COUNTER ─────────────────────────────────────────────────── */
window.updateCounter = () => {
  document.getElementById('chars').innerText =
    document.getElementById('message').value.length;
};

/* ── DARK MODE ───────────────────────────────────────────────── */
window.toggleMode = () => {
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('themeText').innerText =
    isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
  renderChart(getStats(window._posts));
};

/* ── STATISTIK ───────────────────────────────────────────────── */
function getStats(posts) {
  const now = new Date();
  let t = 0, m = 0, y = 0;
  posts.forEach(p => {
    const d = p.date ? new Date(p.date) : null;
    if (!d) return;
    if (d.toDateString() === now.toDateString()) t++;
    if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) m++;
    if (d.getFullYear() === now.getFullYear()) y++;
  });
  return { t, m, y, total: posts.length };
}

/* ── CHART ───────────────────────────────────────────────────── */
let chart;
function renderChart(stats) {
  const ctx    = document.getElementById('chart').getContext('2d');
  const isDark = document.body.classList.contains('dark');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Total','Hari Ini','Bulan Ini','Tahun Ini'],
      datasets: [{
        data: [stats.total, stats.t, stats.m, stats.y],
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.2)',
        fill: true, tension: 0.4
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: isDark ? '#334155' : '#e2e8f0' } }
      }
    }
  });
}

/* ── RENDER POSTS ────────────────────────────────────────────── */
function render(posts) {
  window._posts    = posts;
  window._postsMap = {};
  posts.forEach(p => (window._postsMap[p.id] = p));

  const stats = getStats(posts);
  document.getElementById('today').innerText = stats.t;
  document.getElementById('month').innerText = stats.m;
  document.getElementById('year').innerText  = stats.y;
  document.getElementById('total').innerText = stats.total;
  renderChart(stats);

  const container = document.getElementById('posts');
  container.innerHTML = '';

  posts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';

    // Gambar — tampilkan kalau ada (base64 string)
    const imgTag = p.image
      ? `<img src="${p.image}" class="post-img" loading="lazy" alt="Foto saran">`
      : '';

    const commentsHtml = (p.comments || [])
      .map(c => `<div class="comment-item"><b>Anon:</b> ${c.text}</div>`)
      .join('');

    const dateLabel = p.date
      ? new Date(p.date).toLocaleString('id-ID')
      : 'Baru saja';

    div.innerHTML = `
      <div class="post-header">
        <div class="avatar"></div>
        <div>
          <strong>Anonim</strong><br>
          <span style="opacity:0.6">${dateLabel}</span>
        </div>
      </div>
      <div class="post-content">${p.text}</div>
      ${imgTag}
      <div style="display:flex;gap:10px;">
        <button class="like-btn" onclick="likePost('${p.id}')">❤️ ${p.likes}</button>
        <button class="like-btn">💬 ${(p.comments || []).length}</button>
      </div>
      <div class="comment-section">
        <div class="comment-list">${commentsHtml}</div>
        <div class="comment-input-group">
          <input type="text" id="in-comment-${p.id}"
            class="comment-input" placeholder="Balas saran...">
          <button class="btn-reply" onclick="addComment('${p.id}')">Balas</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

/* ── REALTIME LISTENER ───────────────────────────────────────── */
const q = query(collection(db, 'posts'), orderBy('date', 'desc'));
onSnapshot(q, (snapshot) => {
  const posts = snapshot.docs.map(d => ({
    id:   d.id,
    ...d.data(),
    date: d.data().date?.toDate ? d.data().date.toDate() : null
  }));
  render(posts);
}, (err) => {
  console.error(err);
  showToast('Koneksi ke database gagal. Coba refresh halaman.');
});
</script>

</body>
</html>
